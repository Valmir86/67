<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIX SEVEN</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:white;
text-align:center;
}

header{
padding:18px;
border-bottom:2px solid #D4AF37;
box-shadow:0 0 20px #D4AF37;
}

h1{
color:#D4AF37;
letter-spacing:5px;
margin:0;
}

small{color:#aaa;}

video{
width:92%;
max-width:420px;
margin-top:15px;
border-radius:20px;
border:2px solid #D4AF37;
box-shadow:0 0 20px #D4AF37;
}

button{
margin:8px;
padding:12px 18px;
background:#D4AF37;
border:none;
border-radius:30px;
font-weight:bold;
cursor:pointer;
}

button:hover{transform:scale(1.05);}

.card{
background:#161616;
margin:12px auto;
padding:14px;
width:92%;
max-width:420px;
border-radius:15px;
border:1px solid #D4AF37;
}

.bar{
height:16px;
background:#333;
border-radius:20px;
overflow:hidden;
}

.fill{
height:100%;
width:0%;
background:linear-gradient(90deg,#D4AF37,#F5D76E);
transition:1s;
}

#timer{
font-size:20px;
color:#F5D76E;
margin-top:8px;
}

#perfil{
font-size:26px;
color:#F5D76E;
margin-top:10px;
}

#detalhe{
color:#ccc;
font-size:13px;
margin-top:10px;
line-height:1.5;
}
</style>
</head>

<body>

<header>
<h1>SIX SEVEN</h1>
<small>Black Gold Intelligence</small>
</header>

<video id="video" autoplay playsinline></video>

<br>

<button onclick="start()">INICIAR ANÁLISE</button>
<button onclick="flipCamera()">INVERTER CÂMERA</button>

<div id="timer">50s</div>

<div class="card">
<h3>🌟 Energia de Movimento</h3>
<div class="bar"><div id="energiaBar" class="fill"></div></div>
<p id="energiaTxt">0%</p>
</div>

<div class="card">
<h3>🧠 Ego</h3>
<div class="bar"><div id="egoBar" class="fill"></div></div>
<p id="egoTxt">0%</p>
</div>

<div class="card">
<h3>👁️ Expressividade</h3>
<div class="bar"><div id="expBar" class="fill"></div></div>
<p id="expTxt">0%</p>
</div>

<div class="card">
<h3>⭐ Perfil</h3>
<div id="perfil">-</div>

<div id="detalhe">Aguardando análise...</div>
</div>

<script>

let time = 15;
let interval;
let stream;
let facing = "user";
let motionSeed = 0;

async function start(){

time = 15;

stream = await navigator.mediaDevices.getUserMedia({
video:{facingMode:facing}
});

document.getElementById("video").srcObject = stream;

interval = setInterval(loop,1000);
}

function loop(){

time--;

document.getElementById("timer").innerText = time + "s";

// simula variação de movimento (dança/gestos)
motionSeed = Math.random()*100;

// métricas simuladas inteligentes
let energia = Math.floor((motionSeed + Math.random()*50));
let ego = Math.floor(Math.random()*100);
let expressividade = Math.floor(motionSeed);

document.getElementById("energiaBar").style.width = energia+"%";
document.getElementById("egoBar").style.width = ego+"%";
document.getElementById("expBar").style.width = expressividade+"%";

document.getElementById("energiaTxt").innerText = energia+"%";
document.getElementById("egoTxt").innerText = ego+"%";
document.getElementById("expTxt").innerText = expressividade+"%";

if(time <= 0){
clearInterval(interval);
result(energia,ego,expressividade);
}
}

function result(energia,ego,exp){

let perfis=[
"LÍDER",
"CRIATIVO",
"ANALÍTICO",
"COMUNICADOR",
"PERFORMER"
];

let perfil = perfis[Math.floor(Math.random()*perfis.length)];

document.getElementById("perfil").innerText = perfil;

// análise detalhada estilo IA
let texto="";

if(exp > 70){
texto+="Alta expressividade corporal detectada (gestos intensos ou dança). ";
}else{
texto+="Expressividade moderada ou contida. ";
}

if(energia > 70){
texto+="Nível elevado de energia de movimento. ";
}else{
texto+="Energia de movimento equilibrada. ";
}

if(ego > 70){
texto+="Traços de postura dominante e confiança elevada. ";
}else{
texto+="Postura equilibrada e controlada. ";
}

texto+="Análise baseada em microvariações de movimento, posição da câmera e padrão visual estimado.";

document.getElementById("detalhe").innerText = texto;

document.getElementById("timer").innerText =
"ANÁLISE FINALIZADA";
}

function flipCamera(){

facing = (facing==="user")?"environment":"user";

start();
}

</script>

</body>
</html>
