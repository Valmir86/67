<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SIX SEVEN</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:white;
text-align:center;
}

header{
padding:20px;
border-bottom:2px solid #D4AF37;
box-shadow:0 0 20px #D4AF37;
}

h1{
color:#D4AF37;
letter-spacing:4px;
margin:0;
}

small{color:#aaa;}

video{
width:90%;
max-width:400px;
margin-top:20px;
border-radius:20px;
border:2px solid #D4AF37;
box-shadow:0 0 20px #D4AF37;
}

button{
margin:10px;
padding:12px 20px;
background:#D4AF37;
border:none;
border-radius:30px;
font-weight:bold;
cursor:pointer;
}

button:hover{
transform:scale(1.05);
}

.card{
background:#161616;
margin:15px auto;
padding:15px;
width:90%;
max-width:400px;
border-radius:15px;
border:1px solid #D4AF37;
}

.bar{
height:18px;
background:#333;
border-radius:20px;
overflow:hidden;
}

.fill{
height:100%;
width:0%;
background:linear-gradient(90deg,#D4AF37,#F5D76E);
transition:1s;
}

#timer{
font-size:22px;
color:#F5D76E;
margin-top:10px;
}

#perfil{
font-size:26px;
color:#F5D76E;
margin-top:10px;
}

#detalhado{
color:#ccc;
font-size:14px;
margin-top:10px;
line-height:1.5;
padding:10px;
}
</style>
</head>

<body>

<header>
<h1>SIX SEVEN</h1>
<small>Black Gold Edition</small>
</header>

<video id="video" autoplay playsinline></video>

<br/>

<button onclick="start()">INICIAR ANÁLISE</button>
<button onclick="trocarCamera()">INVERTER CÂMERA</button>

<div id="timer">50s</div>

<div class="card">
<h3>🌟 Energia</h3>
<div class="bar"><div id="energiaBar" class="fill"></div></div>
<p id="energiaTxt">0%</p>
</div>

<div class="card">
<h3>🧠 Ego</h3>
<div class="bar"><div id="egoBar" class="fill"></div></div>
<p id="egoTxt">0%</p>
</div>

<div class="card">
<h3>⭐ Perfil</h3>
<div id="perfil">-</div>

<div id="detalhado">
Aguardando análise...
</div>

</div>

<script>

let time = 50;
let interval;
let currentStream;
let facingMode = "user";

async function start(){

time = 50;

const video = document.getElementById("video");

const stream = await navigator.mediaDevices.getUserMedia({
video:{ facingMode }
});

currentStream = stream;

video.srcObject = stream;

interval = setInterval(timer,1000);
}

function timer(){

time--;

document.getElementById("timer").innerText = time + "s";

if(time <= 0){
clearInterval(interval);
analyze();
}
}

function analyze(){

let energia = Math.floor(Math.random()*100);
let ego = Math.floor(Math.random()*100);

document.getElementById("energiaBar").style.width = energia+"%";
document.getElementById("egoBar").style.width = ego+"%";

document.getElementById("energiaTxt").innerText = energia+"%";
document.getElementById("egoTxt").innerText = ego+"%";

let perfis = [
"LÍDER",
"CRIATIVO",
"ANALÍTICO",
"COMUNICADOR",
"EQUILIBRADO"
];

let perfil = perfis[Math.floor(Math.random()*perfis.length)];

document.getElementById("perfil").innerText = perfil;

// análise detalhada simulada
let detalhe = "";

if(energia > 70){
detalhe += "Alta energia detectada. ";
}else{
detalhe += "Energia moderada ou baixa. ";
}

if(ego > 70){
detalhe += "Traços de ego elevado observados. ";
}else{
detalhe += "Ego equilibrado ou contido. ";
}

detalhe += "Perfil comportamental classificado como " + perfil + ". ";
detalhe += "Baseado em microexpressões e estabilidade visual estimada.";

document.getElementById("detalhado").innerText = detalhe;

document.getElementById("timer").innerText = "ANÁLISE FINALIZADA";
}

function trocarCamera(){

facingMode = (facingMode === "user")
? "environment"
: "user";

start();

}

</script>

</body>
</html>
